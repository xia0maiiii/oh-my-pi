# Vendored from uutils/coreutils tag 0.8.0 (src/uu/mv), patched to resolve path
# arguments against the shell working directory and route I/O + prompts through
# pi-uutils-ctx so it can run in-process as a shell builtin. See src/mv.rs for
# the patch markers (`pi-uutils:` comments).
[package]
name = "uu_mv"
version = "0.8.0"
edition = "2024"
license = "MIT"
description = "mv ~ (uutils) move (rename) SOURCE to DESTINATION (vendored + patched for in-process embedding)"

[lib]
path = "src/mv.rs"

[dependencies]
clap = { version = "4.5", features = ["wrap_help", "cargo", "color"] }
fs_extra = "1.3.0"
indicatif = "0.18.0"
libc = "0.2.172"
rustc-hash = "2.1.1"
thiserror = "2.0.3"
uucore = { version = "0.8.0", features = [
  "backup-control",
  "fs",
  "fsxattr",
  "update-control",
] }
pi-uutils-ctx = { path = "../../pi-uutils-ctx" }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.0", default-features = false, features = [
  "Win32_Foundation",
  "Win32_Security",
  "Win32_Storage_FileSystem",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2.172"

# Declared (but never enabled) so the upstream `#[cfg(feature = "...")]` blocks
# pass check-cfg without pulling SELinux/SMACK support.
[features]
selinux = []
smack = []
