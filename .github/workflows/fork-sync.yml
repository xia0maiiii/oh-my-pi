name: fork-sync

# Watch upstream (can1357/oh-my-pi) for a newer release tag and check whether our
# patch series still rebases cleanly onto it. REPORT-ONLY: it probes on a scratch
# branch, never pushes main, never builds the binary. The actual sync is done
# locally with `fork/sync.sh` (which rebuilds the native addon on your machine).
# See /FORK.md. This is the only workflow we keep active on the fork; upstream's
# own workflows are disabled (this is a private downstream that builds locally).

on:
  schedule:
    - cron: "0 8 * * 1,4" # Mon & Thu 08:00 UTC
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream tag to test (default: newest v*)"
        required: false

permissions:
  contents: read
  issues: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Probe rebase feasibility against upstream
        id: probe
        env:
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "fork-sync-bot"
          git config user.email "fork-sync-bot@users.noreply.github.com"
          git config rerere.enabled true
          git remote add upstream https://github.com/can1357/oh-my-pi.git
          # upstream re-cuts recent tags, so --force (see FORK.md).
          git fetch upstream --tags --force --quiet

          # take newest tag without `| head` (SIGPIPE under pipefail on large tag lists)
          if [ -n "${TAG_INPUT:-}" ]; then
            target="$TAG_INPUT"
          else
            _tags="$(git tag --list 'v*' --sort=-v:refname)"
            target="${_tags%%$'\n'*}"
          fi
          if ! git rev-parse -q --verify "refs/tags/${target}" >/dev/null; then
            echo "tag ${target} not found" >&2; exit 1
          fi
          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse --short "$target")" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor "$target" HEAD; then
            echo "status=uptodate" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$(git merge-base HEAD "$target")"
          if git diff --quiet "$base" "$target" -- crates/; then
            echo "rust=no" >> "$GITHUB_OUTPUT"
          else
            echo "rust=yes" >> "$GITHUB_OUTPUT"
          fi

          git checkout -q -b _fork_sync_probe
          if git rebase "$target" >/tmp/rebase.log 2>&1; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "conflicts=" >> "$GITHUB_OUTPUT"
          else
            conflicts="$(git diff --name-only --diff-filter=U | sort -u | tr '\n' ' ')"
            git rebase --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "conflicts=${conflicts}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update tracking issue
        if: steps.probe.outputs.status != 'uptodate'
        uses: actions/github-script@v7
        env:
          TARGET: ${{ steps.probe.outputs.target }}
          TARGET_SHA: ${{ steps.probe.outputs.target_sha }}
          STATUS: ${{ steps.probe.outputs.status }}
          CONFLICTS: ${{ steps.probe.outputs.conflicts }}
          RUST: ${{ steps.probe.outputs.rust }}
        with:
          script: |
            const { TARGET, TARGET_SHA, STATUS, CONFLICTS, RUST } = process.env;
            const label = "fork-sync";
            const title = `fork-sync: upstream ${TARGET} — rebase ${STATUS}`;
            const buildLine = RUST === "yes" ? "bun run build:native" : "# no native rebuild needed";
            const body = [
              `Upstream release **${TARGET}** (\`${TARGET_SHA}\`) is newer than this fork's \`main\`.`,
              ``,
              `- Rebase of our patch series: **${STATUS}**`,
              (STATUS === "conflict" && CONFLICTS.trim())
                ? `- Conflicting paths: \`${CONFLICTS.trim()}\``
                : `- No conflicts.`,
              `- Native rebuild needed (crates/ changed): **${RUST}**`,
              ``,
              `Sync locally:`,
              "```sh",
              `fork/sync.sh ${TARGET}`,
              buildLine,
              `bun run check && bun --cwd=packages/coding-agent test`,
              `git push --force-with-lease origin main`,
              "```",
              ``,
              `_automated by .github/workflows/fork-sync.yml — record SHA \`${TARGET_SHA}\` in FORK.md after syncing_`,
            ].join("\n");

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: label,
            });
            if (open.data.length) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, title, body,
              });
            } else {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: label, color: "fbca04",
                });
              } catch (e) { /* label exists */ }
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: [label],
              });
            }
